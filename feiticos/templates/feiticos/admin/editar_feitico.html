{% extends 'feiticos/base.html' %}

{% block title %}Editar Feitiço - Painel Administrativo{% endblock %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-purple-950 via-black to-pink-950 p-4 py-12">
    <div class="max-w-2xl mx-auto">
        <!-- Header -->
        <div class="mb-8">
            <a href="{% url 'admin_feiticos' %}" class="text-purple-400 hover:text-purple-300 transition text-sm">
                ← Voltar para Feitiços
            </a>
            <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-400 mt-4">
                ✏️ Editar Feitiço
            </h1>
        </div>

        <!-- Card do formulário -->
        <div class="bg-gradient-to-br from-purple-900/30 to-pink-900/30 border border-purple-500/30 rounded-2xl p-8">
            <form method="post" class="space-y-6">
                {% csrf_token %}

                <!-- Dados do Cliente -->
                <div class="bg-black/20 rounded-lg p-6 border border-purple-500/20">
                    <h3 class="text-lg font-semibold text-purple-300 mb-4">👤 Dados do Cliente</h3>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-purple-200 mb-2">Nome</label>
                            <input 
                                type="text" 
                                name="nome" 
                                value="{{ feitico.nome }}"
                                class="w-full px-4 py-3 bg-purple-900/20 border border-purple-500/30 rounded-lg text-white focus:outline-none focus:border-purple-400 focus:ring-2 focus:ring-purple-400/20 transition"
                            >
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-purple-200 mb-2">Email</label>
                            <input 
                                type="email" 
                                name="email" 
                                value="{{ feitico.email }}"
                                class="w-full px-4 py-3 bg-purple-900/20 border border-purple-500/30 rounded-lg text-white focus:outline-none focus:border-purple-400 focus:ring-2 focus:ring-purple-400/20 transition"
                            >
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-purple-200 mb-2">Telefone</label>
                            <input 
                                type="tel" 
                                name="telefone" 
                                value="{{ feitico.telefone }}"
                                class="w-full px-4 py-3 bg-purple-900/20 border border-purple-500/30 rounded-lg text-white focus:outline-none focus:border-purple-400 focus:ring-2 focus:ring-purple-400/20 transition"
                            >
                        </div>
                    </div>
                </div>

                <!-- Dados do Feitiço -->
                <div class="bg-black/20 rounded-lg p-6 border border-purple-500/20">
                    <h3 class="text-lg font-semibold text-purple-300 mb-4">🪄 Dados do Feitiço</h3>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-purple-200 mb-2">Tipo de Feitiço</label>
                            <input 
                                type="text" 
                                name="tipo_feitico" 
                                value="{{ feitico.tipo_feitico }}"
                                class="w-full px-4 py-3 bg-purple-900/20 border border-purple-500/30 rounded-lg text-white focus:outline-none focus:border-purple-400 focus:ring-2 focus:ring-purple-400/20 transition"
                            >
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-purple-200 mb-2">Descrição</label>
                            <textarea 
                                name="descricao"
                                rows="3"
                                class="w-full px-4 py-3 bg-purple-900/20 border border-purple-500/30 rounded-lg text-white focus:outline-none focus:border-purple-400 focus:ring-2 focus:ring-purple-400/20 transition resize-none"
                            >{{ feitico.descricao }}</textarea>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-purple-200 mb-2">Data</label>
                                <input 
                                    type="date" 
                                    name="data_agendamento" 
                                    value="{{ feitico.data_agendamento|date:'Y-m-d' }}"
                                    class="w-full px-4 py-3 bg-purple-900/20 border border-purple-500/30 rounded-lg text-white focus:outline-none focus:border-purple-400 focus:ring-2 focus:ring-purple-400/20 transition"
                                >
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-purple-200 mb-2">Hora</label>
                                <input 
                                    type="time" 
                                    name="hora_agendamento" 
                                    value="{{ feitico.hora_agendamento|time:'H:i' }}"
                                    class="w-full px-4 py-3 bg-purple-900/20 border border-purple-500/30 rounded-lg text-white focus:outline-none focus:border-purple-400 focus:ring-2 focus:ring-purple-400/20 transition"
                                >
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Status e Valor -->
                <div class="bg-black/20 rounded-lg p-6 border border-purple-500/20">
                    <h3 class="text-lg font-semibold text-purple-300 mb-4">💰 Status e Valor</h3>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-purple-200 mb-2">Status</label>
                            <select 
                                name="status"
                                class="w-full px-4 py-3 bg-purple-900/20 border border-purple-500/30 rounded-lg text-white focus:outline-none focus:border-purple-400 focus:ring-2 focus:ring-purple-400/20 transition"
                            >
                                {% for status_code, status_name in status_choices %}
                                    <option value="{{ status_code }}" {% if feitico.status == status_code %}selected{% endif %}>
                                        {{ status_name }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-purple-200 mb-2">Valor (R$)</label>
                            <input 
                                type="number" 
                                name="valor" 
                                value="{{ feitico.valor }}"
                                step="0.01"
                                readonly
                                class="w-full px-4 py-3 bg-purple-900/20 border border-purple-500/30 rounded-lg text-white focus:outline-none focus:border-purple-400 focus:ring-2 focus:ring-purple-400/20 transition opacity-70 cursor-not-allowed"
                            >
                            <p class="text-xs text-purple-400 mt-1">Valor não pode ser alterado</p>
                        </div>
                    </div>
                </div>

                <!-- Botões -->
                <div class="flex gap-4">
                    <button 
                        type="submit"
                        class="flex-1 py-3 px-4 bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 text-white font-bold rounded-lg transition transform hover:scale-105 active:scale-95"
                    >
                        ✅ Salvar Alterações
                    </button>
                    <a 
                        href="{% url 'admin_feiticos' %}"
                        class="flex-1 py-3 px-4 bg-purple-900/50 hover:bg-purple-800 text-purple-200 font-bold rounded-lg transition text-center"
                    >
                        ❌ Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
